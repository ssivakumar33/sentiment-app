<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analysis</title>
</head>

<body>
    <h2>Azure Sentiment Analysis</h2>

    <form method="POST">
        <input type="text" name="text" placeholder="Enter text" required>
        <button type="submit">Analyze</button>
    </form>

    {% if sentiment %}
        <h3>Sentiment: {{ sentiment }}</h3>
    {% endif %}

</body>
</html>
